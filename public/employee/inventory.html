<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Employee</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">Shop Inventory (Employee)</div>
            <div class="user-info">
                <span>Welcome, <span id="userNameDisplay">Employee</span></span>
                <a href="/public/employee/dashboard.html" class="btn btn-primary btn-sm">Dashboard</a>
                <a href="#" id="logoutBtn" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="header-section mt-1">
            <h2>Inventory Catalog</h2>
            <p>View current stock levels and update quantities as needed.</p>
        </div>

        <div class="mt-2">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Product Search</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="searchInput" placeholder="Search by name or category" style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; width: 300px;">
                    <button id="searchBtn" class="btn btn-primary">Search</button>
                </div>
            </div>
            <div class="table-container mt-1">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <tr>
                            <td colspan="6" class="text-center">Loading inventory...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/inventory.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            authHelper.checkAccess('employee');
        });
    </script>
</body>
</html>
