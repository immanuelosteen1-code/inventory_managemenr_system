<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail Inventory Management System</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #0f1b2b, #1c2b4a);
      color: #fff;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100%;
      background-color: #111b2b;
      padding-top: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }
    .sidebar h2 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 18px;
    }
    .sidebar a {
      display: block;
      color: #c0c0c0;
      padding: 12px 20px;
      text-decoration: none;
      font-size: 16px;
      margin: 4px 0;
      border-radius: 5px;
      transition: all 0.3s ease;
    }
    .sidebar a:hover, .sidebar a.active {
      background-color: #0f77ff;
      color: #fff;
    }
    .main-content {
      margin-left: 240px;
      padding: 30px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; margin: 0; }
    .header .user { font-size: 14px; }
    .cards { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      flex: 1 1 200px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(15,119,255,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover { box-shadow: 0 0 25px rgba(15,119,255,0.5); }
    .card h3 { margin: 10px 0 5px; font-size: 28px; color: #0f77ff; }
    .card p { margin: 0; color: #c0c0c0; font-size: 14px; }
    .buttons { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
    .buttons button {
      flex: 1 1 150px;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background-color: #0f77ff;
      transition: all 0.3s ease;
    }
    .buttons button:hover { background-color: #0951c2; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td { padding: 12px 15px; text-align: left; }
    th { background: rgba(15,119,255,0.5); color: #fff; }
    tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
    tr:hover { background-color: rgba(15,119,255,0.2); }
    .quantity.positive { color: #0f77ff; }
    .quantity.negative { color: #ff4d4d; }
    input, select { padding: 5px; border-radius: 4px; border: none; margin-right: 5px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Inventory</h2>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Products</a>
    <a href="#">Add Product</a>
    <a href="#">Update Stock</a>
    <a href="#">Reports</a>
    <a href="#">Users</a>
    <a href="#">Logout</a>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Retail Inventory Management System</h1>
      <div class="user">Welcome, Admin | <a href="#" style="color:#0f77ff;">Logout</a></div>
    </div>

    <div class="cards">
      <div class="card" id="total-products">
        <p>Total Products</p>
        <h3>0</h3>
      </div>
      <div class="card" id="low-stock">
        <p>Low Stock Items</p>
        <h3>0</h3>
      </div>
      <div class="card" id="items-sold">
        <p>Items Sold Today</p>
        <h3>0</h3>
      </div>
    </div>

    <div class="buttons">
      <button onclick="addProduct()">Add Product</button>
      <button onclick="updateStock()">Update Stock</button>
      <button onclick="viewProducts()">View Products</button>
      <button onclick="generateReport()">Generate Report</button>
    </div>

    <h2>Recent Activity</h2>
    <table id="activity-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Action</th>
          <th>Quantity</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    // Initial data
    let products = [
      { name: 'T-shirt', quantity: 200 },
      { name: 'Jeans', quantity: 7 },
      { name: 'Sneakers', quantity: 50 },
      { name: 'Cap', quantity: 20 },
      { name: 'Krat', quantity: 5 }
    ];

    let recentActivity = [
      { product: 'T-shirt', action: 'Stock Added', quantity: 200, date: 'Today' },
      { product: 'Jeans', action: 'Stock Updated', quantity: 7, date: 'Today' },
      { product: 'Sneakers', action: 'New Product', quantity: -50, date: 'Today' },
      { product: 'Cap', action: 'Stock Added', quantity: 20, date: 'Yesterday' },
      { product: 'Krat', action: 'New Product', quantity: 5, date: 'Yesterday' }
    ];

    function renderDashboard() {
      document.querySelector('#total-products h3').innerText = products.length;
      let lowStockCount = products.filter(p => p.quantity < 10).length;
      document.querySelector('#low-stock h3').innerText = lowStockCount;
      document.querySelector('#items-sold h3').innerText = recentActivity.filter(a => a.action.includes('Sold')).length;

      let tbody = document.querySelector('#activity-table tbody');
      tbody.innerHTML = '';
      recentActivity.forEach(a => {
        let row = document.createElement('tr');
        row.innerHTML = `
          <td>${a.product}</td>
          <td>${a.action}</td>
          <td class="quantity ${a.quantity >= 0 ? 'positive' : 'negative'}">${a.quantity >=0 ? '+'+a.quantity : a.quantity}</td>
          <td>${a.date}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function addProduct() {
      let name = prompt('Enter product name:');
      let qty = parseInt(prompt('Enter quantity:'));
      if(name && !isNaN(qty)){
        products.push({ name, quantity: qty });
        recentActivity.unshift({ product: name, action: 'New Product', quantity: qty, date: 'Today' });
        renderDashboard();
      }
    }

    function updateStock() {
      let name = prompt('Enter product name to update:');
      let product = products.find(p => p.name.toLowerCase() === name.toLowerCase());
      if(product){
        let qty = parseInt(prompt('Enter quantity to add/subtract:'));
        if(!isNaN(qty)){
          product.quantity += qty;
          recentActivity.unshift({ product: product.name, action: 'Stock Updated', quantity: qty, date: 'Today' });
          renderDashboard();
        }
      } else {
        alert('Product not found!');
      }
    }

    function viewProducts() {
      alert(products.map(p => `${p.name}: ${p.quantity}`).join('\n'));
    }

    function generateReport() {
      alert('Report Generated! (Demo)');
    }

    renderDashboard();
  </script>
</body>
</html>
